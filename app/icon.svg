<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Solid background for tab visibility -->
  <rect width="100" height="100" rx="24" fill="#00272B"/>
  <!-- Design: The smooth flowing curve -->
  <circle cx="42" cy="50" r="20" stroke="#FFFFFF" stroke-width="7" stroke-linecap="round"/>
  <!-- Engineering: The sharp grid square -->
  <rect x="44" y="36" width="28" height="28" rx="4" stroke="#E0FF4F" stroke-width="7" stroke-linejoin="round" fill="none"/>
  <!-- The intersecting core dot -->
  <circle cx="50" cy="50" r="4.5" fill="#E0FF4F" stroke="#00272B" stroke-width="2"/>
</svg>
